<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VelocityGamers | Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo-text">
            <img src="Tienda_Velocity/logo.png" alt="Logo" class="nav-logo">
            VELOCITY<span>GAMERS</span>
        </div>
        <div class="nav-actions">
            <button class="btn-nav">LOGIN</button>
            <button class="btn-nav signup">SIGN UP</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-background">
            <img src="Tienda_Velocity/logo.png" class="logo-blur">
        </div>
        
        <div class="hero-content">
            <h1 class="main-title">VELOCITY<span>GAMERS</span></h1>
            <p class="subtitle">POTENCIA SIN LÍMITES</p>
            
            <div class="search-velocity">
                <div class="ia-tag">VELOCITY IA</div>
                <input type="text" id="ia-input" placeholder="¿Qué hardware buscas?">
                <button id="gen-btn">GENERAR</button>
            </div>
        </div>
    </header>

    <section class="tienda-productos">
        <div class="grid-productos">
            <div class="card">
                <div class="card-img"><img src="Tienda_Velocity/cpu.png" alt="CPU"></div>
                <h3>PROCESADORES</h3>
            </div>
            <div class="card">
                <div class="card-img"><img src="Tienda_Velocity/laptop.png" alt="Laptop"></div>
                <h3>LAPTOPS</h3>
            </div>
            <div class="card">
                <div class="card-img"><img src="Tienda_Velocity/logo.png" alt="Logo"></div>
                <h3>VELOCITY GEAR</h3>
            </div>
            <div class="card">
                <div class="card-img"><img src="Tienda_Velocity/teclado.png" alt="Teclado"></div>
                <h3>PERIFÉRICOS</h3>
            </div>
        </div>
    </section>

    <footer class="footer-social">
        <div class="social-icons">
            <a href="https://www.facebook.com/profile.php?id=61562945495077" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/velocitygamers/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@velocitygamers" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.youtube.com/@velocitygamers10" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
        <a href="https://chat.whatsapp.com/JRi7sxRJmDc0gdVj2naEgM" class="whatsapp-btn">
            UNIRSE A LA COMUNIDAD
        </a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
