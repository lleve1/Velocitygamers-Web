<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Gamers | Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="logo-text">
            <img src="Tienda_Velocity/logo.png" alt="Velocity Logo" class="nav-logo">
            VELOCITY<span>GAMERS</span>
        </div>
        <nav class="nav-actions">
            <button class="btn-nav">LOGIN</button>
            <button class="btn-nav signup">SIGN UP</button>
            <button id="darkModeToggle" class="btn-nav" aria-label="Alternar modo oscuro">
                <i class="fas fa-moon"></i>
            </button>
        </nav>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="main-title">VELOCITY<span>GAMERS</span></h1>
            <p class="subtitle">POTENCIA SIN LÍMITES</p>
            <form class="search-velocity" id="ia-form">
                <label for="ia-input" class="ia-tag">VELOCITY IA</label>
                <input type="text" id="ia-input" placeholder="¿Qué hardware buscas?">
                <button type="submit" id="gen-btn">GENERAR</button>
            </form>
            <div id="ia-response" class="ia-response"></div>
        </div>
    </section>

    <!-- Productos -->
    <main>
        <section class="tienda-productos">
            <div class="grid-productos">
                <article class="card">
                    <div class="card-img"><img src="Tienda_Velocity/cpu.png" alt="Procesadores"></div>
                    <h3>PROCESADORES</h3>
                </article>
                <article class="card">
                    <div class="card-img"><img src="Tienda_Velocity/laptop.png" alt="Laptops"></div>
                    <h3>LAPTOPS</h3>
                </article>
                <article class="card">
                    <div class="card-img"><img src="Tienda_Velocity/logo.png" alt="Velocity Gear"></div>
                    <h3>VELOCITY GEAR</h3>
                </article>
                <article class="card">
                    <div class="card-img"><img src="Tienda_Velocity/teclado.png" alt="Periféricos"></div>
                    <h3>PERIFÉRICOS</h3>
                </article>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer-social">
        <div class="social-icons">
            <a href="https://www.facebook.com/profile.php?id=61562945495077" target="_blank" rel="noopener" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/velocitygamers/" target="_blank" rel="noopener" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@velocitygamers" target="_blank" rel="noopener" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.youtube.com/@velocitygamers10" target="_blank" rel="noopener" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
        </div>
        <a href="https://chat.whatsapp.com/JRi7sxRJmDc0gdVj2naEgM" class="whatsapp-btn" target="_blank" rel="noopener">UNIRSE A LA COMUNIDAD</a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
