<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VelocityGamers | Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- HEADER -->
    <header class="navbar">
        <a href="#" class="logo">
            <img src="https://i.ibb.co/bgZtjL2N/logo.jpg" alt="VelocityGamers Logo" class="logo-img">
            VELOCITY<span>GAMERS</span>
        </a>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Productos</a></li>
                <li><a href="#">Comunidad</a></li>
                <li><button id="darkModeToggle" class="btn-icon" aria-label="Modo claro/oscuro">
                    <i class="fas fa-moon"></i>
                </button></li>
                <li><button class="btn-login">Login</button></li>
            </ul>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="title">VELOCITY<span>GAMERS</span></h1>
            <p class="subtitle">POTENCIA SIN LÍMITES</p>
            <form class="search-box" id="ia-form">
                <label for="ia-input" class="ia-tag">VELOCITY IA</label>
                <input type="text" id="ia-input" placeholder="¿Qué hardware buscas?">
                <button type="submit" id="gen-btn">GENERAR</button>
            </form>
            <div id="ia-response" class="ia-response"></div>
        </div>
        <div class="scan-line"></div>
    </section>

    <!-- PRODUCTOS -->
    <main>
        <section class="productos">
            <h2 class="section-title">NUESTRO ARSENAL</h2>
            <div class="grid-productos">
                <article class="card">
                    <div class="card-icon"><i class="fas fa-microchip"></i></div>
                    <h3>PROCESADORES</h3>
                </article>
                <article class="card">
                    <div class="card-icon"><i class="fas fa-laptop"></i></div>
                    <h3>LAPTOPS</h3>
                </article>
                <article class="card">
                    <img src="https://i.ibb.co/bgZtjL2N/logo.jpg" alt="Velocity Gear" class="card-img-small">
                    <h3>VELOCITY GEAR</h3>
                </article>
                <article class="card">
                    <div class="card-icon"><i class="fas fa-keyboard"></i></div>
                    <h3>PERIFÉRICOS</h3>
                </article>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="social-icons">
            <a href="https://www.facebook.com/profile.php?id=61562945495077" target="_blank" rel="noopener" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/velocitygamers/" target="_blank" rel="noopener" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@velocitygamers" target="_blank" rel="noopener" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.youtube.com/@velocitygamers10" target="_blank" rel="noopener" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
        </div>
        <a href="https://chat.whatsapp.com/JRi7sxRJmDc0gdVj2naEgM" class="whatsapp-btn" target="_blank" rel="noopener">UNIRSE A LA COMUNIDAD</a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
